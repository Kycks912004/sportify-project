<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rendez-vous Confirmé</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('salle-omnes.jpg'); /* Image de fond */
            background-size: cover;
            background-position: center;
        }

        .rendez-vous-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        .rendez-vous {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
            margin-bottom: 10px;
        }

        .rendez-vous p {
            margin: 5px 0;
        }

        .annuler-rendez-vous {
            background-color: #ff4c4c;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .annuler-rendez-vous:hover {
            background-color: #ff0000;
        }

        .message-annulation {
            color: green;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="rendez-vous-container">
        <h1>Vos Rendez-vous Confirmés</h1>
        <div id="rendez_vous">
            <div class="rendez-vous">
                <p>Coach: Charlie Lebrun</p>
                <p>Date: Mercredi</p>
                <p>Heure: 09:00</p>
                <p>Adresse: 123 Rue de la Musculation, 75001 Paris</p>
                <p>Document demandé: Certificat Médical</p>
                <p>Digicode: 1234</p>
                <button class="annuler-rendez-vous" onclick="annulerRendezVous()">Annuler le RDV</button>
            </div>
        </div>
        <div id="message_annulation" class="message-annulation" style="display: none;">
            Votre rendez-vous a été annulé.
        </div>
    </div>
    <script>
        function annulerRendezVous() {
            document.getElementById('rendez_vous').style.display = 'none';
            document.getElementById('message_annulation').style.display = 'block';
        }
    </script>
</body>
</html>
