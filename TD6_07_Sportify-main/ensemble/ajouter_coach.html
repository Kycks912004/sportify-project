<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter ou Modifier Coach</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        .form-container h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group input[type="file"] {
            padding: 3px;
        }
        .form-group textarea {
            resize: vertical;
        }
        .form-group input[type="submit"] {
            background-color: #5cb85c;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .form-group input[type="submit"]:hover {
            background-color: #4cae4c;
        }
        .form-group input[type="submit"]:active {
            background-color: #45a045;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Ajouter ou Modifier Coach</h2>
        <form id="coach-form" action="ajouter_coach.php" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label for="utilisateur_id">Utilisateur ID:</label>
                <input type="number" name="utilisateur_id" required>
            </div>
            <div class="form-group">
                <label for="specialite">Spécialité:</label>
                <input type="text" name="specialite" required>
            </div>
            <div class="form-group">
                <label for="disponibilite">Disponibilité:</label>
                <textarea name="disponibilite" required></textarea>
            </div>
            <div class="form-group">
                <label for="bio">Bio:</label>
                <textarea name="bio" required></textarea>
            </div>
            <div class="form-group">
                <label for="photo">Photo:</label>
                <input type="file" name="photo" accept="image/*" required>
            </div>
            <div class="form-group">
                <label for="xml_file">Fichier XML:</label>
                <input type="file" name="xml_file" accept=".xml">
            </div>
            <div class="form-group">
                <input type="submit" value="Enregistrer">
            </div>
        </form>
    </div>

    <script>
        document.getElementById('coach-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            fetch('ajouter_coach.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(result => {
                alert(result); // Affiche le message de confirmation ou d'erreur
                if (result.includes('succès')) {
                    this.reset(); // Réinitialise le formulaire si le coach a été ajouté avec succès
                }
            })
            .catch(error => {
                console.error('Erreur:', error);
                alert('Erreur lors de l\'ajout du coach.');
            });
        });
    </script>
</body>
</html>
