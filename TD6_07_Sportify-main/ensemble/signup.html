<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportify: Inscription</title>
    <link rel="stylesheet" href="stylesL.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <h1><span class="highlight">Sportify:</span> Inscription</h1>
        </header>
        <section class="section">
            <div class="signup-form">
                <h2>Inscription</h2>
                <form id="signupForm" action="signup.php" method="POST">
                    <label for="name">Nom:</label>
                    <input type="text" id="name" name="name" required>
                    <label for="prenom">Prénom:</label>
                    <input type="text" id="prenom" name="prenom" required>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    <label for="password">Mot de passe:</label>
                    <input type="password" id="password" name="password" required>
                    <label for="role">Rôle:</label>
                    <select id="role" name="role" required>
                        <option value="client">Client</option>
                        <option value="coach">Coach</option>
                        <option value="admin">Administrateur</option>
                    </select>
                    <label for="address">Adresse Ligne 1:</label>
                    <input type="text" id="address" name="address" required>
                    <label for="address_line2">Adresse Ligne 2:</label>
                    <input type="text" id="address_line2" name="address_line2">
                    <label for="ville">Ville:</label>
                    <input type="text" id="ville" name="ville" required>
                    <label for="code_postal">Code Postal:</label>
                    <input type="text" id="code_postal" name="code_postal" required>
                    <label for="pays">Pays:</label>
                    <input type="text" id="pays" name="pays" required>
                    <label for="phone">Numéro de téléphone:</label>
                    <input type="text" id="phone" name="phone" required>
                    <label for="student_card">Carte Étudiant:</label>
                    <input type="text" id="student_card" name="student_card" required>
                    <div id="payment-info" style="display: none;">
                        <h3>Informations de paiement</h3>
                        <label for="type_carte">Type de carte de paiement:</label>
                        <select id="type_carte" name="type_carte">
                            <option value="Visa">Visa</option>
                            <option value="MasterCard">MasterCard</option>
                            <option value="American Express">American Express</option>
                            <option value="PayPal">PayPal</option>
                        </select>
                        <label for="numero_carte">Numéro de la carte:</label>
                        <input type="text" id="numero_carte" name="numero_carte">
                        <label for="nom_carte">Nom affiché sur la carte:</label>
                        <input type="text" id="nom_carte" name="nom_carte">
                        <label for="date_expiration">Date d'expiration de la carte:</label>
                        <input type="month" id="date_expiration" name="date_expiration">
                        <label for="code_securite">Code de sécurité:</label>
                        <input type="text" id="code_securite" name="code_securite">
                    </div>
                    <button type="submit">S'inscrire</button>
                </form>
            </div>
        </section>
        <footer class="footer">
            <div class="contact-info">
                <h2>Contactez-nous</h2>
                <p>Email: contact@sportify.com</p>
                <p>Téléphone: 01 23 45 67 89</p>
                <p>Adresse: 10 rue Sextius Michel, 75016 Paris</p>
            </div>
        </footer>
    </div>
    <script>
        document.getElementById('role').addEventListener('change', function() {
            var paymentInfo = document.getElementById('payment-info');
            if (this.value === 'client') {
                paymentInfo.style.display = 'block';
            } else {
                paymentInfo.style.display = 'none';
            }
        });
    </script>
</body>
</html>
