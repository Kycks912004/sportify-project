<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sportify: Votre Compte</title>
    <link rel="stylesheet" href="stylesL.css">
</head>
<body>
    <div class="wrapper">
        <header class="header">
            <h1><span class="highlight">Sportify:</span> Votre Compte</h1>
        </header>
        <nav class="navigation">
            <button onclick="window.location.href='index.html'">Accueil</button>
            <button onclick="window.location.href='tout-parcourir.html'">Tout Parcourir</button>
            <button onclick="window.location.href='recherche.php'">Recherche</button>
            <button onclick="window.location.href='rendezvous.html'">Rendez-vous</button>
            <button onclick="window.location.href='compte.html'">Votre Compte</button>
        </nav>
        <section class="section">
            <div class="account-info">
                <h2>Bienvenue, <span id="user-name">Utilisateur</span></h2>
                <p id="user-email">Email: user@example.com</p>
                <p id="user-type">Type de compte: Client</p>
                <div class="account-actions">
                    <button class="styled-button" onclick="window.location.href='edit_account.html'">Modifier Profil</button>
                    <button class="styled-button" onclick="logout()">Déconnexion</button>
                </div>
            </div>
            <div id="admin-actions" style="display: none;">
                <h2>Gestion des Coachs</h2>
                <button class="styled-button" onclick="window.location.href='ajouter_coach.html'">Ajouter un Coach</button>
                <div id="coach-list">
                    <!-- La liste des coachs sera chargée ici -->
                </div>
            </div>
            <div class="appointments">
                <h2>Vos Rendez-vous</h2>
                <ul id="appointment-list">
                    <!-- Les rendez-vous seront chargés ici -->
                </ul>
            </div>
        </section>
        <footer class="footer">
            <div class="contact-info">
                <h2>Contactez-nous</h2>
                <p>Email: contact@sportify.com</p>
                <p>Téléphone: 01 23 45 67 89</p>
                <p>Adresse: 10 rue Sextius Michel, 75015 Paris</p>
            </div>
        </footer>
    </div>
    <script src="scriptsL.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch("compte.php")
                .then(response => response.json())
                .then(data => {
                    document.getElementById('user-name').textContent = data.name;
                    document.getElementById('user-email').textContent = 'Email: ' + data.email;
                    document.getElementById('user-type').textContent = 'Type de compte: ' + data.userType;

                    if (data.userType === 'admin') {
                        document.getElementById('admin-actions').style.display = 'block';
                        loadCoachList();
                    }

                    loadAppointments(data.appointments);
                });
        });

        function loadCoachList() {
            fetch("get_coachs.php")
                .then(response => response.json())
                .then(data => {
                    console.log(data); // Ajoutez cette ligne pour inspecter les données
                    const coachList = document.getElementById('coach-list');
                    coachList.innerHTML = '';  // Clear previous list
                    data.coachs.forEach(coach => {
                        const coachItem = document.createElement('div');
                        coachItem.innerHTML = `
                            <p>${coach.nom} (${coach.specialite})</p>
                            <button class="styled-button small-button" onclick="editCoach(${coach.coach_id})">Modifier</button>
                            <button class="styled-button small-button" onclick="deleteCoach(${coach.coach_id})">Supprimer</button>
                        `;
                        coachList.appendChild(coachItem);
                    });
                });
        }

        function loadAppointments(appointments) {
            const appointmentList = document.getElementById('appointment-list');
            appointmentList.innerHTML = '';  // Clear previous list
            appointments.forEach(appointment => {
                const listItem = document.createElement('li');
                listItem.textContent = appointment.details; // Modifier selon les détails disponibles
                appointmentList.appendChild(listItem);
            });
        }

        function logout() {
            fetch('logout.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    window.location.href = 'login.html';
                } else {
                    alert('Erreur lors de la déconnexion.');
                }
            });
        }

        function editCoach(id) {
            window.location.href = `modifier_coach.html?coach_id=${id}`;
        }

        function deleteCoach(id) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce coach ?')) {
                fetch('supprimer_coach.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `coach_id=${id}`
                })
                .then(response => response.text())
                .then(result => {
                    alert(result);
                    console.log(result); // Log pour débogage
                    loadCoachList();  // Recharge la liste des coachs après suppression
                })
                .catch(error => console.error('Erreur lors de la suppression du coach :', error));
            }
        }
    </script>
</body>
</html>
