<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horaire de la gym</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('salle-omnes.jpg'); /* Ajoutez une image de fond inspirante */
            background-size: cover;
            background-position: center;
        }

        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            text-align: center;
            margin: 20px;
        }

        .card h1 {
            font-size: 36px;
            color: #ff6600;
            margin-bottom: 30px;
        }

        .card p {
            font-size: 24px;
            color: #666;
            margin-bottom: 30px;
        }

        .card .hours {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
        }

        .card button {
            background-color: #ff6600;
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
            transition: background-color 0.3s;
        }

        .card button:hover {
            background-color: #e65c00;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Horaire de la gym</h1>
        <p>Rejoignez notre communauté dynamique et profitez des installations de pointe et des horaires flexibles de notre gym.</p>
        <div class="hours">
            <p><strong>Horaires d'ouverture :</strong></p>
            <p>Lundi à Vendredi : 6h - 22h</p>
            <p>Samedi : 8h - 20h</p>
            <p>Dimanche : 8h - 18h</p>
        </div>
        
    </div>
</body>
</html>
